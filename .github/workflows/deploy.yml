name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

# 2026년 6월 강제 전환에 대비한 Node.js 24 실행 환경 설정
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    steps:
      # 최신 v4 이상 버전 사용 (Node.js 24 최적화)
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        # v3에서 v4로 버전 업그레이드 (가장 중요한 변경점)
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        # v4에서 v5로 버전 업그레이드 (2026년 표준 버전)
        uses: actions/deploy-pages@v5
